[server]
log_level = info
health_port = 8080

[store]
db_path = /data/signet.db

[nostr]
relays = ws://relay-1:8080,ws://relay-2:8080,ws://relay-3:8080
reconnect_interval_s = 1
provisioner_pubkeys =
identity = nostrig-acceptance

[policy_defaults]
default_decision = deny
allowed_kinds = 1,30900
rate_limit_rpm = 0

[replay]
max_entries = 1000
ttl_seconds = 600
skew_seconds = 120

[audit]
stdout = true
