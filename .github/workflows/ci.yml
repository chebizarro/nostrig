name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: 1.25.12
          cache-dependency-path: go.sum

      - name: Verify
        run: make check GO_TOOLCHAIN=local

  image:
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build OCI image, SBOM, provenance, and digest
        run: make release-image IMAGE_NAME=nostrig:${{ github.sha }}

      - name: Upload release build metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nostrig-${{ github.sha }}
          path: |
            build/nostrig.oci.tar
            build/image-metadata.json
            build/image-digest.txt
          if-no-files-found: error
          retention-days: 14
