services:
  nostrig-serve:
    build:
      context: .
    image: nostrig:local
    command: ["serve", "--observability-addr", "127.0.0.1:8080", "--outbox-path", "/var/lib/nostrig/outbox.json", "--instance-lock", "/var/lib/nostrig/instance.lock"]
    environment:
      NOSTRIG_ENV: production
      NOSTR_RELAY: ${NOSTR_RELAY:-wss://relay.sharegap.net}
      NOSTRIG_REPO_ADDRS: ${NOSTRIG_REPO_ADDRS:?set one or more canonical 30617 repo addresses}
      NOSTRIG_SIGNER_BUNKER_URL: ${NOSTRIG_SIGNER_BUNKER_URL:?set the Signet/NIP-46 bunker URL}
      NOSTRIG_SIGNER_CLIENT_SECRET_KEY_FILE: /run/secrets/nostrig_signer_client_secret_key
    secrets:
      - source: nostrig_signer_client_secret_key
        target: nostrig_signer_client_secret_key
        uid: "65532"
        gid: "65532"
        mode: 0400
    volumes:
      - nostrig-state:/var/lib/nostrig
    read_only: true
    user: "65532:65532"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_signal: SIGTERM
    stop_grace_period: 30s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

secrets:
  nostrig_signer_client_secret_key:
    file: ${NOSTRIG_SIGNER_CLIENT_SECRET_FILE:-./secrets/nostrig_signer_client_secret_key}

volumes:
  nostrig-state:
